<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Барин — Админ панель</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --gold: #c9a84c; --dark: #1a1a1a; --red: #e63946; --green: #2d6a4f; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; color: #222; }

    /* LOGIN */
    .login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--dark);
    }
    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.8rem; color: var(--gold); letter-spacing: 3px; margin-bottom: 8px; }
    .login-box p { color: #888; font-size: 0.85rem; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px; border: 1px solid #ddd;
      border-radius: 8px; margin-bottom: 12px;
      font-size: 1rem; outline: none;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box button {
      width: 100%; padding: 13px;
      background: var(--dark); color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer;
    }
    .login-box button:hover { background: #333; }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 10px; }

    /* ADMIN PANEL */
    .admin-panel { display: none; }
    .admin-panel.visible { display: block; }

    .top-bar {
      background: var(--dark);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .top-bar h1 { font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; }
    .top-bar-right { display: flex; gap: 12px; align-items: center; }
    .top-bar a { color: #aaa; font-size: 0.85rem; text-decoration: none; }
    .top-bar a:hover { color: #fff; }
    .btn-logout {
      background: none; border: 1px solid #555; color: #aaa;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    .btn-logout:hover { border-color: #fff; color: #fff; }

    .admin-main { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    /* STATS */
    .stats { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      background: #fff; border-radius: 10px; padding: 16px 20px;
      flex: 1; min-width: 140px; border-left: 4px solid var(--gold);
    }
    .stat-card .num { font-size: 2rem; font-weight: bold; }
    .stat-card .label { font-size: 0.8rem; color: #888; margin-top: 2px; }

    /* ADD ITEM FORM */
    .add-section {
      background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 28px;
    }
    .add-section h2 { font-size: 1rem; margin-bottom: 16px; color: var(--dark); }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .form-row input, .form-row select, .form-row textarea {
      flex: 1; min-width: 160px; padding: 9px 12px;
      border: 1px solid #ddd; border-radius: 7px;
      font-size: 0.9rem; outline: none;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--gold); }
    .form-row textarea { min-height: 60px; resize: vertical; }
    .btn-add {
      background: var(--green); color: #fff;
      border: none; padding: 10px 24px;
      border-radius: 7px; cursor: pointer; font-size: 0.9rem;
    }
    .btn-add:hover { opacity: 0.85; }

    /* CATEGORY SECTION */
    .cat-section { margin-bottom: 32px; }
    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--dark); color: var(--gold);
      padding: 12px 18px; border-radius: 10px 10px 0 0;
    }
    .cat-header h2 { font-size: 1rem; letter-spacing: 1px; }
    .cat-count { font-size: 0.8rem; color: #aaa; }

    /* ITEM ROW */
    .item-row {
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 14px;
      transition: background 0.15s;
    }
    .item-row:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
    .item-row.inactive { background: #fafafa; opacity: 0.6; }
    .item-row:hover { background: #f9f7f3; }

    .item-photo {
      width: 56px; height: 42px;
      border-radius: 6px; object-fit: cover;
      background: #eee; flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 0.75rem; color: #aaa; }

    /* TOGGLE SWITCH */
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { display: none; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 24px; cursor: pointer;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

    /* INLINE EDIT */
    .item-price-input {
      width: 90px; padding: 6px 8px;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.85rem; text-align: center;
    }
    .item-price-input:focus { border-color: var(--gold); outline: none; }

    .btn-save {
      background: var(--gold); color: #000;
      border: none; padding: 6px 12px;
      border-radius: 6px; cursor: pointer;
      font-size: 0.8rem; font-weight: bold;
    }
    .btn-del {
      background: none; color: #ccc;
      border: none; font-size: 1.1rem; cursor: pointer; padding: 4px;
    }
    .btn-del:hover { color: var(--red); }

    .loading { text-align: center; padding: 60px; color: #aaa; }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--dark); color: #fff;
      padding: 12px 20px; border-radius: 8px;
      font-size: 0.9rem; z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>БАРИН</h1>
    <p>Панель администратора</p>
    <input type="text" id="loginUser" placeholder="Логин" value="admin">
    <input type="password" id="loginPass" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Войти</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <div class="top-bar">
    <h1>БАРИН · ADMIN</h1>
    <div class="top-bar-right">
      <a href="index.html" target="_blank">↗ Меню</a>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="admin-main">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="statTotal">—</div>
        <div class="label">Всего блюд</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statActive">—</div>
        <div class="label">Активных</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statHidden">—</div>
        <div class="label">Скрытых</div>
      </div>
    </div>

    <!-- Add new item -->
    <div class="add-section">
      <h2>+ Добавить новое блюдо</h2>
      <div class="form-row">
        <select id="newCat"></select>
        <input type="text" id="newName" placeholder="Название (RU) *">
        <input type="text" id="newPrice" placeholder="Цена напр. 15 ₼ *">
        <input type="number" id="newPriceVal" placeholder="Цена (число)" min="0">
      </div>
      <div class="form-row">
        <input type="text" id="newNameAz" placeholder="Название (AZ)">
        <input type="text" id="newNameEn" placeholder="Название (EN)">
        <select id="newBadge">
          <option value="">Без бейджа</option>
          <option value="hit">Хит</option>
          <option value="sig">Авторское</option>
          <option value="veg">Вег</option>
          <option value="fish">Рыба</option>
        </select>
      </div>
      <div class="form-row">
        <input type="text" id="newPhoto" placeholder="URL фото (Unsplash)">
        <input type="text" id="newDesc" placeholder="Описание (RU)">
      </div>
      <button class="btn-add" onclick="addItem()">Добавить блюдо</button>
    </div>

    <!-- Menu items -->
    <div id="menuList"><div class="loading">Загрузка…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://rbjatapvjubsdaycdbyp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiamF0YXB2anVic2RheWNkYnlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTEyNTUsImV4cCI6MjA5NzY4NzI1NX0.yG3LIOU2poxRMGVVshER20G1XntBIDTbmNh2YDvMYbM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin';

let allCats = [];
let allItems = [];

// AUTH
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    sessionStorage.setItem('adminAuth', '1');
    showPanel();
  } else {
    document.getElementById('loginErr').textContent = 'Неверный логин или пароль';
  }
}

function logout() {
  sessionStorage.removeItem('adminAuth');
  document.getElementById('adminPanel').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').classList.add('visible');
  loadData();
}

// Check if already logged in
if (sessionStorage.getItem('adminAuth') === '1') showPanel();

// DATA
async function loadData() {
  const [{ data: cats }, { data: items }] = await Promise.all([
    sb.from('categories').select('*').order('sort_order'),
    sb.from('menu_items').select('*').order('sort_order')
  ]);
  allCats = cats || [];
  allItems = items || [];
  renderCatSelect();
  renderStats();
  renderList();
}

function renderCatSelect() {
  document.getElementById('newCat').innerHTML = allCats.map(c =>
    `<option value="${c.slug}">${c.name_ru}</option>`
  ).join('');
}

function renderStats() {
  document.getElementById('statTotal').textContent = allItems.length;
  const active = allItems.filter(i => i.is_active).length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statHidden').textContent = allItems.length - active;
}

function renderList() {
  const bySlug = {};
  allItems.forEach(item => {
    if (!bySlug[item.category_slug]) bySlug[item.category_slug] = [];
    bySlug[item.category_slug].push(item);
  });

  document.getElementById('menuList').innerHTML = allCats.map(cat => {
    const items = bySlug[cat.slug] || [];
    if (!items.length) return '';
    const activeCount = items.filter(i => i.is_active).length;
    return `
      <div class="cat-section">
        <div class="cat-header">
          <h2>${cat.name_ru}</h2>
          <span class="cat-count">${activeCount}/${items.length} активно</span>
        </div>
        ${items.map(itemRowHtml).join('')}
      </div>`;
  }).join('');
}

function itemRowHtml(item) {
  const photo = item.photo_url || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=80&h=60&fit=crop';
  return `
    <div class="item-row ${item.is_active ? '' : 'inactive'}" id="row-${item.id}">
      <img class="item-photo" src="${photo}" onerror="this.src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=80&h=60&fit=crop'" alt="">
      <div class="item-info">
        <div class="item-name">${item.name_ru}</div>
        <div class="item-sub">${item.name_az || ''}</div>
      </div>
      <input class="item-price-input" id="price-${item.id}" value="${item.price_display}" title="Редактировать цену">
      <button class="btn-save" onclick="savePrice(${item.id})">✓</button>
      <label class="toggle" title="${item.is_active ? 'Скрыть' : 'Показать'}">
        <input type="checkbox" ${item.is_active ? 'checked' : ''} onchange="toggleActive(${item.id}, this.checked)">
        <span class="toggle-slider"></span>
      </label>
      <button class="btn-del" onclick="deleteItem(${item.id})" title="Удалить">🗑</button>
    </div>`;
}

// ACTIONS
async function toggleActive(id, active) {
  const { error } = await sb.from('menu_items').update({ is_active: active }).eq('id', id);
  if (error) { toast('Ошибка: ' + error.message); return; }
  const item = allItems.find(i => i.id === id);
  if (item) item.is_active = active;
  document.getElementById('row-' + id)?.classList.toggle('inactive', !active);
  renderStats();
  toast(active ? '✓ Блюдо включено' : '✗ Блюдо скрыто');
}

async function savePrice(id) {
  const newPrice = document.getElementById('price-' + id)?.value.trim();
  if (!newPrice) return;
  const numMatch = newPrice.match(/[\d.]+/);
  const priceValue = numMatch ? parseFloat(numMatch[0]) : 0;
  const { error } = await sb.from('menu_items').update({ price_display: newPrice, price_value: priceValue }).eq('id', id);
  if (error) { toast('Ошибка: ' + error.message); return; }
  const item = allItems.find(i => i.id === id);
  if (item) { item.price_display = newPrice; item.price_value = priceValue; }
  toast('✓ Цена обновлена');
}

async function deleteItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!confirm(`Удалить "${item?.name_ru}"?`)) return;
  const { error } = await sb.from('menu_items').delete().eq('id', id);
  if (error) { toast('Ошибка: ' + error.message); return; }
  allItems = allItems.filter(i => i.id !== id);
  renderStats();
  renderList();
  toast('🗑 Блюдо удалено');
}

async function addItem() {
  const name = document.getElementById('newName').value.trim();
  const price = document.getElementById('newPrice').value.trim();
  if (!name || !price) { toast('Заполни название и цену'); return; }
  const priceVal = parseFloat(document.getElementById('newPriceVal').value) || 0;
  const badge = document.getElementById('newBadge').value;
  const badgeLabels = { hit:'Хит', sig:'Авторское', veg:'Вег', fish:'Рыба' };
  const newItem = {
    category_slug: document.getElementById('newCat').value,
    name_ru: name,
    name_az: document.getElementById('newNameAz').value.trim(),
    name_en: document.getElementById('newNameEn').value.trim(),
    description_ru: document.getElementById('newDesc').value.trim(),
    price_display: price,
    price_value: priceVal,
    photo_url: document.getElementById('newPhoto').value.trim(),
    badge: badge,
    badge_label: badgeLabels[badge] || '',
    is_active: true
  };
  const { data, error } = await sb.from('menu_items').insert([newItem]).select();
  if (error) { toast('Ошибка: ' + error.message); return; }
  allItems.push(data[0]);
  // Clear form
  ['newName','newNameAz','newNameEn','newPrice','newPriceVal','newPhoto','newDesc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('newBadge').value = '';
  renderStats();
  renderList();
  toast('✓ Блюдо добавлено!');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
