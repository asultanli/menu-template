<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Барин — Меню</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --gold: #c9a84c;
      --dark: #1a1a1a;
      --card-bg: #fff;
      --text: #222;
      --sub: #888;
      --badge-hit: #e63946;
      --badge-sig: #c9a84c;
      --badge-veg: #2d6a4f;
      --badge-fish: #1d6fa4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #f5f0e8; color: var(--text); }

    /* HEADER */
    header {
      background: var(--dark);
      color: #fff;
      text-align: center;
      padding: 32px 16px 24px;
      position: relative;
    }
    header h1 { font-size: 2.4rem; letter-spacing: 4px; color: var(--gold); }
    header p { font-size: 0.9rem; letter-spacing: 2px; color: #aaa; margin-top: 6px; }
    .admin-link {
      position: absolute; top: 16px; right: 16px;
      color: #444; font-size: 1.1rem; text-decoration: none;
    }
    .admin-link:hover { color: var(--gold); }

    /* CATEGORY NAV */
    .cat-nav {
      background: #fff;
      border-bottom: 2px solid var(--gold);
      padding: 0 12px;
      display: flex;
      overflow-x: auto;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 100;
      scrollbar-width: none;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      background: none;
      border: none;
      padding: 14px 16px;
      font-family: 'Georgia', serif;
      font-size: 0.85rem;
      color: var(--sub);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .cat-btn:hover { color: var(--dark); border-bottom-color: var(--gold); }

    /* CART BUTTON */
    .cart-bar {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      gap: 12px;
      align-items: center;
      white-space: nowrap;
    }
    .cart-bar.visible { display: flex; }
    .cart-bar .cbadge {
      background: var(--gold);
      color: #000;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
    }

    /* CART MODAL */
    .cart-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
    }
    .cart-overlay.open { display: block; }
    .cart-modal {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 24px;
      max-height: 80vh;
      overflow-y: auto;
      z-index: 301;
    }
    .cart-modal h2 { font-size: 1.3rem; margin-bottom: 16px; }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
      gap: 12px;
    }
    .cart-item-name { flex: 1; }
    .cart-item-qty { display: flex; align-items: center; gap: 8px; }
    .cart-item-qty button {
      background: #f0f0f0; border: none; width: 28px; height: 28px;
      border-radius: 50%; cursor: pointer; font-size: 1rem;
    }
    .cart-total { font-size: 1.1rem; font-weight: bold; margin: 16px 0; text-align: right; }
    .cart-close {
      width: 100%;
      background: var(--dark); color: #fff;
      border: none; padding: 14px;
      border-radius: 8px; cursor: pointer;
      font-size: 1rem; font-family: 'Georgia', serif;
    }

    /* MENU SECTIONS */
    .menu-section { max-width: 1200px; margin: 0 auto; padding: 40px 16px 20px; }
    .section-title {
      font-size: 1.5rem;
      color: var(--dark);
      border-left: 4px solid var(--gold);
      padding-left: 16px;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .section-subtitle { color: #888; font-size: 0.8rem; margin-top: 4px; font-weight: normal; }

    /* GROUP LABEL (drinks subcategories) */
    .group-label {
      font-family: sans-serif;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-top: 1px solid #e0e0e0;
      padding-top: 20px;
      margin: 20px 0 16px;
    }

    /* CARD GRID */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
    }
    .card-photo {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #e8e0d4;
    }
    .card-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }
    .card:hover .card-photo img { transform: scale(1.05); }
    .card-badge {
      position: absolute;
      top: 10px; left: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
    }
    .badge-hit  { background: var(--badge-hit); }
    .badge-sig  { background: var(--badge-sig); color: #000; }
    .badge-veg  { background: var(--badge-veg); }
    .badge-fish { background: var(--badge-fish); }

    .card-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-name { font-size: 1rem; font-weight: bold; line-height: 1.3; }
    .card-sub  { font-size: 0.75rem; color: var(--sub); font-family: sans-serif; }
    .card-desc { font-size: 0.82rem; color: #555; flex: 1; }
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px;
    }
    .card-price { font-size: 1.15rem; font-weight: bold; color: var(--dark); }
    .card-add {
      background: var(--dark); color: #fff;
      border: none; width: 34px; height: 34px;
      border-radius: 50%; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .card-add:hover { background: var(--gold); color: #000; }

    /* LOADING */
    .loading { text-align: center; padding: 80px 20px; color: #aaa; font-size: 1rem; font-family: sans-serif; }

    /* FOOTER */
    footer {
      background: var(--dark);
      color: #888;
      text-align: center;
      padding: 24px;
      font-family: sans-serif;
      font-size: 0.8rem;
      margin-top: 60px;
    }
  </style>
</head>
<body>

<header>
  <h1>БАРИН</h1>
  <p>РУССКИЙ РЕСТОРАН · BAKU</p>
  <a class="admin-link" href="admin.html" title="Администрация">⚙</a>
</header>

<nav class="cat-nav" id="catNav"></nav>

<main id="menuMain">
  <div class="loading">Загружаем меню…</div>
</main>

<button class="cart-bar" id="cartBtn" onclick="openCart()">
  🛒 Корзина · <span id="cartTotal">0 ₼</span>
  <span class="cbadge" id="cartCount">0</span>
</button>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-modal" id="cartModal">
  <h2>Корзина</h2>
  <div id="cartItems"></div>
  <div class="cart-total" id="cartTotalLine"></div>
  <button class="cart-close" onclick="closeCart()">Закрыть</button>
</div>

<footer>© 2025 Барин · Баку</footer>

<script>
const SUPABASE_URL = 'https://rbjatapvjubsdaycdbyp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiamF0YXB2anVic2RheWNkYnlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTEyNTUsImV4cCI6MjA5NzY4NzI1NX0.yG3LIOU2poxRMGVVshER20G1XntBIDTbmNh2YDvMYbM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let cart = {};
let allItems = [];

async function loadMenu() {
  const [{ data: cats, error: e1 }, { data: items, error: e2 }] = await Promise.all([
    sb.from('categories').select('*').order('sort_order'),
    sb.from('menu_items').select('*').eq('is_active', true).order('sort_order')
  ]);
  if (e1 || e2 || !cats) {
    document.getElementById('menuMain').innerHTML = '<div class="loading">Ошибка загрузки. Проверь подключение.</div>';
    return;
  }
  allItems = items || [];
  renderNav(cats);
  renderMenu(cats, allItems);
}

function renderNav(cats) {
  document.getElementById('catNav').innerHTML = cats.map(c =>
    `<button class="cat-btn" onclick="scrollToSection('cat-${c.slug}')">${c.name_ru}</button>`
  ).join('');
}

function renderMenu(cats, items) {
  const bySlug = {};
  items.forEach(item => {
    if (!bySlug[item.category_slug]) bySlug[item.category_slug] = [];
    bySlug[item.category_slug].push(item);
  });

  document.getElementById('menuMain').innerHTML = cats.map(cat => {
    const catItems = bySlug[cat.slug] || [];
    if (!catItems.length) return '';
    const subtitle = [cat.name_az, cat.name_en].filter(Boolean).join(' · ');

    let body;
    if (cat.slug === 'drinks') {
      const groups = {};
      catItems.forEach(item => {
        const g = item.group_name || 'Напитки';
        if (!groups[g]) groups[g] = [];
        groups[g].push(item);
      });
      body = Object.entries(groups).map(([g, gItems]) =>
        `<div class="group-label">${g}</div><div class="card-grid">${gItems.map(cardHtml).join('')}</div>`
      ).join('');
    } else {
      body = `<div class="card-grid">${catItems.map(cardHtml).join('')}</div>`;
    }

    return `<section class="menu-section" id="cat-${cat.slug}">
      <h2 class="section-title">${cat.name_ru}${subtitle ? `<div class="section-subtitle">${subtitle}</div>` : ''}</h2>
      ${body}
    </section>`;
  }).join('');
}

function cardHtml(item) {
  const badgeLabels = { hit:'Хит', sig:'Авторское', veg:'Вег', fish:'Рыба' };
  const badge = item.badge && badgeLabels[item.badge]
    ? `<span class="card-badge badge-${item.badge}">${item.badge_label || badgeLabels[item.badge]}</span>` : '';
  const sub = [item.name_az, item.name_en].filter(Boolean).join(' · ');
  const photo = item.photo_url || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&h=450&fit=crop';
  const nameEsc = (item.name_ru || '').replace(/'/g, "&#39;");
  return `<div class="card" onclick="addToCart(${item.id},'${nameEsc}',${item.price_value})">
    <div class="card-photo">
      <img src="${photo}" alt="" onerror="this.src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&h=450&fit=crop'">
      ${badge}
    </div>
    <div class="card-body">
      <div class="card-name">${item.name_ru}</div>
      ${sub ? `<div class="card-sub">${sub}</div>` : ''}
      ${item.description_ru ? `<div class="card-desc">${item.description_ru}</div>` : ''}
      <div class="card-footer">
        <span class="card-price">${item.price_display}</span>
        <button class="card-add" onclick="event.stopPropagation();addToCart(${item.id},'${nameEsc}',${item.price_value})">+</button>
      </div>
    </div>
  </div>`;
}

function scrollToSection(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// CART
function addToCart(id, name, price) {
  if (!cart[id]) cart[id] = { name, price, qty: 0 };
  cart[id].qty++;
  updateCartUI();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartUI();
}

function updateCartUI() {
  const totalQty = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  const totalPrice = Object.values(cart).reduce((s, i) => s + i.qty * i.price, 0);
  document.getElementById('cartCount').textContent = totalQty;
  document.getElementById('cartTotal').textContent = totalPrice + ' ₼';
  document.getElementById('cartBtn').classList.toggle('visible', totalQty > 0);
  renderCartItems(totalPrice);
}

function renderCartItems(total) {
  const el = document.getElementById('cartItems');
  const entries = Object.entries(cart);
  if (!entries.length) { el.innerHTML = '<p style="color:#aaa;padding:16px 0">Корзина пуста</p>'; return; }
  el.innerHTML = entries.map(([id, item]) =>
    `<div class="cart-item">
      <div class="cart-item-name">${item.name}</div>
      <div class="cart-item-qty">
        <button onclick="changeQty(${id},-1)">−</button>
        <span>${item.qty}</span>
        <button onclick="changeQty(${id},1)">+</button>
        <span style="width:60px;text-align:right">${item.qty * item.price} ₼</span>
      </div>
    </div>`
  ).join('');
  document.getElementById('cartTotalLine').textContent = 'Итого: ' + total + ' ₼';
}

function openCart() { document.getElementById('cartOverlay').classList.add('open'); updateCartUI(); }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); }

loadMenu();
</script>
</body>
</html>
